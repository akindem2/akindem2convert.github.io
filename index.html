<!DOCTYPE html>
<html>
<body>
<script>
async function convert() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (!code) {
        document.body.innerText = "Error: No share code provided.";
        return;
    }

    const shareUrl = `https://www.roblox.com/share?code=${code}&type=Server`;

    // Open popup
    const popup = window.open(shareUrl, "_blank", "width=400,height=400");

    const interval = setInterval(() => {
        try {
            const url = popup.location.href;

            // Detect redirect
            if (url.includes("privateServerLinkCode")) {
                clearInterval(interval);
                popup.close();

                const placeId = url.match(/games\/(\d+)/)?.[1] || null;
                const privateCode = url.match(/privateServerLinkCode=([^&]+)/)?.[1] || null;

                const result = {
                    shareCode: code,
                    placeId,
                    privateServerLinkCode: privateCode,
                    finalUrl: url
                };

                document.body.innerText = JSON.stringify(result, null, 2);
            }
        } catch (e) {
            // Cross-origin until redirect finishes
        }
    }, 200);
}

convert();
</script>
</body>
</html>
