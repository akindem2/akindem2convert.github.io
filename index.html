<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Private Server Link Converter</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-hover: #059669;
            --border: #d1d5db;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 480px;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        p {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            text-align: center;
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: monospace;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn-main {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-main:hover {
            background-color: var(--primary-hover);
        }

        .result-group {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .result-item {
            margin-bottom: 1.25rem;
            background-color: #f9fafb;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .result-item input {
            background-color: transparent;
            border: none;
            padding: 0;
            margin-bottom: 0.75rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .result-item input:focus {
            box-shadow: none;
        }

        .btn-copy {
            width: 100%;
            background-color: var(--success);
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-copy:hover {
            background-color: var(--success-hover);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Share Code Converter</h1>
    <p>Turn a 32-character share code into a clickable Roblox private server link or direct app launcher.</p>

    <div class="input-group">
        <label for="shareCode">Enter Share Code</label>
        <input type="text" id="shareCode" placeholder="e.g. 4423c60f3b2b9e46943b630b6f116f01" autocomplete="off">
    </div>

    <button class="btn-main" onclick="convertCode()">Generate Links</button>

    <div class="result-group" id="resultGroup">
        <div class="result-item">
            <label>🌐 Web Link (Share URL)</label>
            <input type="text" id="webLink" readonly>
            <button class="btn-copy" onclick="copyToClipboard('webLink', this)">Copy Web Link</button>
        </div>
        
        <div class="result-item">
            <label>🚀 App Deeplink (Direct Join)</label>
            <input type="text" id="deepLink" readonly>
            <button class="btn-copy" onclick="copyToClipboard('deepLink', this)">Copy Deeplink</button>
        </div>
    </div>
</div>

<script>
    function convertCode() {
        let inputVal = document.getElementById('shareCode').value.trim();
        let code = "";
        
        // RegEx to look for a 32-character hex string (in case the user pastes a messy string)
        const hexMatch = inputVal.match(/[a-fA-F0-9]{32}/);
        
        if (hexMatch) {
            code = hexMatch[0];
        } else {
            // Strip non-alphanumeric chars as a fallback
            code = inputVal.replace(/[^a-zA-Z0-9]/g, '');
        }

        if (code.length !== 32) {
            alert('Invalid input! Please enter a valid 32-character Roblox share code.');
            return;
        }

        // Formats for Roblox [1]
        const webLink = `https://www.roblox.com/share?code=${code}&type=Server`;
        const deepLink = `roblox://navigation/share_links?code=${code}&type=Server`;

        // Update UI
        document.getElementById('webLink').value = webLink;
        document.getElementById('deepLink').value = deepLink;
        document.getElementById('resultGroup').style.display = 'block';
        
        // Reset button texts
        const buttons = document.querySelectorAll('.btn-copy');
        buttons[0].textContent = "Copy Web Link";
        buttons[1].textContent = "Copy Deeplink";
    }

    function copyToClipboard(elementId, btnElement) {
        const input = document.getElementById(elementId);
        
        // Select text for mobile compatibility
        input.select();
        input.setSelectionRange(0, 99999); 
        
        navigator.clipboard.writeText(input.value).then(() => {
            const originalText = btnElement.textContent;
            btnElement.textContent = "✅ Copied!";
            
            setTimeout(() => {
                btnElement.textContent = originalText;
            }, 2000);
        }).catch(err => {
            alert('Failed to copy. You can manually copy the text in the box.');
        });
    }
</script>

</body>
</html>
